<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confirming payment — Ticker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0D1117; --panel:#151B23; --ink:#E6EDF3; --sub:#8B96A3; --mute:#5C6672;
    --line:#242C36; --green:#2FBF6E; --red:#E5484D; --blue:#4C9BE8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font-family:'Inter',sans-serif;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{width:100%; max-width:420px; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:32px 28px; text-align:center;}
  .spinner{width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--blue); border-radius:50%; margin:0 auto 20px; animation:spin 0.8s linear infinite;}
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .icon{width:44px; height:44px; border-radius:50%; margin:0 auto 18px; display:flex; align-items:center; justify-content:center; font-size:22px;}
  .icon.success{background:rgba(47,191,110,0.15); color:var(--green);}
  .icon.error{background:rgba(229,72,77,0.15); color:var(--red);}
  h1{font-family:'IBM Plex Mono',monospace; font-size:18px; margin:0 0 8px; color:#fff;}
  p{font-size:13.5px; color:var(--sub); line-height:1.6; margin:0 0 22px;}
  .amount{font-family:'IBM Plex Mono',monospace; font-size:26px; color:var(--green); margin-bottom:6px;}
  a.btn{
    display:inline-block; background:var(--blue); color:#fff; text-decoration:none; padding:11px 22px;
    border-radius:8px; font-size:13.5px; font-weight:600;
  }
</style>
</head>
<body>

<div class="card" id="card">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">Confirming your payment…</h1>
  <p id="message">Checking with Stripe, this only takes a second.</p>
</div>

<script>
async function confirmDeposit(){
  const params = new URLSearchParams(window.location.search);
  const provider = params.get("provider") || "stripe"; // Stripe's own redirect never adds ?provider=, so default to stripe
  const sessionId = params.get("session_id");
  const ref = params.get("ref");
  const token = localStorage.getItem("ticker_token");
  const card = document.getElementById("card");

  const confirmId = provider === "square" ? ref : sessionId;
  if(!confirmId){
    return renderError("No payment reference found in the URL.");
  }
  if(!token){
    return renderError("You're not signed in. Sign in again and check your balance — if payment succeeded, it may already be applied.");
  }

  const endpoint = provider === "square"
    ? "/api/deposit/square/confirm?ref=" + encodeURIComponent(confirmId)
    : "/api/deposit/confirm?session_id=" + encodeURIComponent(confirmId);

  try{
    const res = await fetch(endpoint, {
      headers: { "Authorization": "Bearer " + token }
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "Something went wrong confirming your payment.");

    document.getElementById("spinner").remove();
    const icon = document.createElement("div");
    icon.className = "icon success";
    icon.textContent = "✓";
    card.prepend(icon);

    document.getElementById("title").textContent = data.alreadyProcessed ? "Already added" : "Funds added";
    document.getElementById("message").innerHTML = `
      <div class="amount">+$${(data.amount || 0).toFixed(2)}</div>
      New balance: $${data.user.balanceUsd.toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2})}<br><br>
      This is paper money added to your Ticker trading balance — no real cryptocurrency was purchased.
    `;
    const btn = document.createElement("a");
    btn.href = "/index.html#crypto";
    btn.className = "btn";
    btn.textContent = "Back to Ticker →";
    card.appendChild(btn);
  } catch(err){
    renderError(err.message);
  }

  function renderError(msg){
    document.getElementById("spinner").remove();
    const icon = document.createElement("div");
    icon.className = "icon error";
    icon.textContent = "!";
    card.prepend(icon);
    document.getElementById("title").textContent = "Couldn't confirm payment";
    document.getElementById("message").textContent = msg;
    const btn = document.createElement("a");
    btn.href = "/index.html#crypto";
    btn.className = "btn";
    btn.textContent = "Back to Ticker →";
    card.appendChild(btn);
  }
}
confirmDeposit();
</script>

</body>
</html>
